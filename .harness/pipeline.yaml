pipeline:
  name: hello-world-pipeline
  identifier: hello_world_pipeline
  orgIdentifier: default
  projectIdentifier: HelloWorld
  tags:
    language: java
    app: hello-world

  properties:
    ci:
      codebase:
        connectorRef: account.GitHubConnector
        repoName: BZala011/Harness
        build: <+input>

  stages:
    # ── Stage 1: Build & Test ───────────────────────────────────────────────
    - stage:
        name: Build and Test
        identifier: Build_and_Test
        type: CI
        spec:
          cloneCodebase: true

          platform:
            os: Linux
            arch: Amd64

          runtime:
            type: Cloud
            spec: {}

          execution:
            steps:
              - step:
                  type: Run
                  name: Compile
                  identifier: Compile
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    command: |
                      echo "Java version:"
                      java -version
                      echo "Maven version:"
                      mvn --version
                      mvn --batch-mode compile

              - step:
                  type: Run
                  name: Unit Tests
                  identifier: Unit_Tests
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    command: mvn --batch-mode test
                  reports:
                    type: JUnit
                    spec:
                      paths:
                        - "**/target/surefire-reports/*.xml"

              - step:
                  type: Run
                  name: Checkstyle
                  identifier: Checkstyle
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    command: mvn --batch-mode checkstyle:check

              - step:
                  type: Run
                  name: Code Coverage Gate
                  identifier: Code_Coverage_Gate
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    command: mvn --batch-mode jacoco:check

              - step:
                  type: Run
                  name: Secret Detection
                  identifier: Secret_Detection
                  spec:
                    image: zricethezav/gitleaks:latest
                    shell: Sh
                    command: gitleaks detect --source=. --no-git -v --exit-code 1

              - step:
                  type: RestoreCacheS3
                  name: Restore Dependency-Check Data
                  identifier: Restore_Dependency_Check_Data
                  spec:
                    connectorRef: account.AwsConnector
                    region: us-east-1
                    bucket: harness-cache-bucket
                    key: owasp-dc-data-v1

              - step:
                  type: Run
                  name: Dependency Vulnerability Scan
                  identifier: Dependency_Vulnerability_Scan
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    envVariables:
                      NVD_API_KEY: <+secrets.getValue("nvd_api_key")>
                    command: |
                      mvn --batch-mode org.owasp:dependency-check-maven:check \
                        -DdataDirectory=/root/.m2/dependency-check-data

              - step:
                  type: SaveCacheS3
                  name: Cache Dependency-Check Data
                  identifier: Cache_Dependency_Check_Data
                  spec:
                    connectorRef: account.AwsConnector
                    region: us-east-1
                    bucket: harness-cache-bucket
                    key: owasp-dc-data-v1
                    sourcePaths:
                      - /root/.m2/dependency-check-data
                  when:
                    stageStatus: Success

              - step:
                  type: Run
                  name: Package
                  identifier: Package
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    command: |
                      mvn --batch-mode package -DskipTests
                      echo "Artefact produced:"
                      ls -lh target/*.jar

              - step:
                  type: SaveCacheS3
                  name: Cache Maven Dependencies
                  identifier: Cache_Maven_Dependencies
                  spec:
                    connectorRef: account.AwsConnector
                    region: us-east-1
                    bucket: harness-cache-bucket
                    key: maven-{{ checksum "pom.xml" }}
                    sourcePaths:
                      - /root/.m2/repository
                  when:
                    stageStatus: Success

          caching:
            enabled: true
            paths:
              - /root/.m2/repository
